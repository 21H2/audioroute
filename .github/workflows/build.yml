name: Build Android

# Build a release APK and AAB on every push (and on demand).
on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # This repo ships the Gradle config but not the binary gradle-wrapper.jar.
      # Generate it into a throwaway project and copy ONLY the wrapper files in,
      # so the custom MainActivity.kt / manifest / build.gradle are left intact.
      - name: Restore Gradle wrapper
        run: |
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            flutter create --platforms=android \
              --org com.example --project-name audioroute /tmp/wrapper_gen
            cp /tmp/wrapper_gen/android/gradlew android/gradlew
            cp /tmp/wrapper_gen/android/gradlew.bat android/gradlew.bat
            cp /tmp/wrapper_gen/android/gradle/wrapper/gradle-wrapper.jar \
              android/gradle/wrapper/gradle-wrapper.jar
            chmod +x android/gradlew
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: audioroute-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: audioroute-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
