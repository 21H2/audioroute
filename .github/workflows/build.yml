name: Build & Release Android

# On every push: bump the version, build, commit the bump back, and publish
# a GitHub Release with an installable APK (+ AAB).
on:
  push:
  workflow_dispatch:

# Needed to push the version-bump commit and create tags/releases.
permissions:
  contents: write

jobs:
  build:
    name: Bump + Build + Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # This repo ships the Gradle config but not the binary gradle-wrapper.jar.
      # Generate it into a throwaway project and copy ONLY the wrapper files in,
      # so the custom MainActivity.kt / manifest / build.gradle are left intact.
      - name: Restore Gradle wrapper
        run: |
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            flutter create --platforms=android \
              --org com.example --project-name audioroute /tmp/wrapper_gen
            cp /tmp/wrapper_gen/android/gradlew android/gradlew
            cp /tmp/wrapper_gen/android/gradlew.bat android/gradlew.bat
            cp /tmp/wrapper_gen/android/gradle/wrapper/gradle-wrapper.jar \
              android/gradle/wrapper/gradle-wrapper.jar
            chmod +x android/gradlew
          fi

      # Read major.minor.patch+build from pubspec, bump patch AND build by one.
      # e.g. 1.0.0+1  ->  1.0.1+2  (versionName 1.0.1, versionCode 2)
      - name: Bump version
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version://; s/[[:space:]]//g')
          NAME=${CURRENT%%+*}
          BUILD=${CURRENT##*+}
          MAJOR=$(echo "$NAME" | cut -d. -f1)
          MINOR=$(echo "$NAME" | cut -d. -f2)
          PATCH=$(echo "$NAME" | cut -d. -f3)
          NEW_NAME="${MAJOR}.${MINOR}.$((PATCH + 1))"
          NEW_BUILD=$((BUILD + 1))
          NEW_VERSION="${NEW_NAME}+${NEW_BUILD}"
          sed -i "s/^version:.*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "name=${NEW_NAME}" >> "$GITHUB_OUTPUT"
          echo "code=${NEW_BUILD}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Install dependencies
        run: flutter pub get

      # Universal (fat) APK — single file that installs on any phone/ABI.
      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      # Friendly, version-stamped file names for the release page.
      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/audioroute-${{ steps.version.outputs.name }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
            "dist/audioroute-${{ steps.version.outputs.name }}.aab"

      # Commit the bumped pubspec back. [skip ci] stops it re-triggering us.
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "ci: bump version to ${{ steps.version.outputs.name }}+${{ steps.version.outputs.code }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.ref_name }}
          name: AudioRoute ${{ steps.version.outputs.name }}
          body: |
            📲 **Install:** download the `.apk` below on your phone and tap it.
            (Allow "install unknown apps" for your browser if prompted.)

            - **versionName:** `${{ steps.version.outputs.name }}`
            - **versionCode:** `${{ steps.version.outputs.code }}`
            - **commit:** ${{ github.sha }}

            > Debug-signed: the APK installs directly; the AAB is for future Play upload.
          files: |
            dist/audioroute-${{ steps.version.outputs.name }}.apk
            dist/audioroute-${{ steps.version.outputs.name }}.aab
          fail_on_unmatched_files: true
