plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.audioroute"
    compileSdk = 36
    // Pinned to satisfy the highest NDK any plugin requires (e.g. jni).
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.example.audioroute"
        // setCommunicationDevice() needs API 31; minSdk 26 lets us use
        // XML-only adaptive launcher icons (no binary PNG assets required).
        minSdk = 26
        targetSdk = 36
        // Driven by `flutter build --build-number=.. --build-name=..` in CI;
        // falls back to the `version:` field in pubspec.yaml locally.
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // Signed with debug keys so `flutter run --release` works out of the box.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
